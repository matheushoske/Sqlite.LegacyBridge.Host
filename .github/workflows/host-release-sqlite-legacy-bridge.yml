name: Host Release

on:
  push:
    tags:
      - "host-v*"
  workflow_dispatch:

jobs:
  build-host:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore host
        run: dotnet restore "src/Plu.Sqlite.LegacyBridge.Host/Sqlite.LegacyBridge.Host.csproj"

      - name: Build host release
        run: dotnet build "src/Plu.Sqlite.LegacyBridge.Host/Sqlite.LegacyBridge.Host.csproj" -c Release --no-restore

      - name: Prepare artifact folder
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Copy-Item "src/Plu.Sqlite.LegacyBridge.Host/bin/Release/net481/*" "artifacts/" -Recurse -Force

      - name: Upload host artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-legacy-bridge-host-net481
          path: artifacts/**

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/host-v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**

