name: Host Release

on:
  push:
    branches:
      - master
      - main
    tags:
      - "host-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-host:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore host
        run: dotnet restore "src/Sqlite.LegacyBridge.Host/Sqlite.LegacyBridge.Host.csproj"

      - name: Build host release
        run: dotnet build "src/Sqlite.LegacyBridge.Host/Sqlite.LegacyBridge.Host.csproj" -c Release --no-restore

      - name: Validate net462 host output
        run: |
          $hostExe = "src/Sqlite.LegacyBridge.Host/bin/Release/net462/Sqlite.LegacyBridge.Host.exe"
          if (-not (Test-Path $hostExe)) {
            throw "Build inválido: não encontrou $hostExe"
          }

      - name: Prepare artifact folder
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Copy-Item "src/Sqlite.LegacyBridge.Host/bin/Release/net462/*" "artifacts/" -Recurse -Force

      - name: Resolve release tag
        id: release_tag
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            "tag=${{ github.ref_name }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            $generatedTag = "host-v$(Get-Date -Format 'yyyy.MM.dd.HHmmss')"
            "tag=$generatedTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Pack release zip
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $zipName = "Sqlite.LegacyBridge.Host.zip"
          $zipPath = Join-Path "dist" $zipName
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "artifacts\\*" -DestinationPath $zipPath -CompressionLevel Optimal

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: dist/*.zip

